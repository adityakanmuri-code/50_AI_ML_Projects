project:
    name: "Amazon_Reviews_Sentimment_Analysis"
    base_dir: "C:\\Aditya\\ML_Practice\\ML_Projects"

logging:
  log_dir: "logs"
  log_level: "INFO"
  log_format: '[%(asctime)s] %(lineno)d %(name)s - %(levelname)s - %(message)s'

data:
    train:
        source_type: file
        file_name: C:\Aditya\ML_Practice\ML_Projects\Amazon_Reviews_Sentimment_Analysis\datasets\amazon_reviews.csv
        file_extension: csv
        read_params: 
            encoding: 'utf-8'
    scrape:
        source_type: scrape
        search_urls:
          - "https://www.amazon.in/s?k=redmi"
          - "https://www.amazon.in/s?k=footwear"
          - "https://www.amazon.in/s?k=nike"
          - "https://www.amazon.in/s?k=crocs"
          - "https://www.amazon.in/s?k=adidas"
          - "https://www.amazon.in/s?k=reebok"
          - "https://www.amazon.in/s?k=faber"
        
        output_file: "C:\\Aditya\\ML_Practice\\ML_Projects\\Amazon_Reviews_Sentimment_Analysis\\datasets\\amazon_reviews_scrapped.csv"
        max_reviews: 200


transformation:
    clean_steps:
        - name: drop_unwanted_cols
          params: 
            drop_col: ['Unnamed: 0','reviewerName','reviewTime','day_diff','helpful_yes','helpful_no','total_vote','score_pos_neg_diff','score_average_rating', 'wilson_lower_bound']
        - name: fill_na
          params:
            targetcol: 'overall'
    transform_steps:
        - name: features_setting
          params:
            mappings:
                overall:
                    threshold: 3
                    positive_value: 1
                    negative_value: 0
                    operator: ">"
    text_preprocessing:
      preprocess_steps:
        - name: lower_text
          params: 
            col: reviewText
        - name: remove_special_characters
          params:
            col: reviewText
            search_pattern: "[^a-zA-z0-9]"
        - name: remove_white_spaces
          params:
            col: reviewText
            search_pattern: r"\s+""
        - name: handling_negations
          params:
            col: reviewText
            search_pattern: r"\bnot\s+(\w+)"
            replace_pattern: r"not_\1"
        - name: removing_emoji
          params:
            col: reviewText
        - name: removing_short_words
          params:
            col: reviewText
            word_length: 2
        - name: handling_url
          params:
            col: reviewText
            url_pattern: r"https\S+|www\S+"
            html_pattern: r"<.*?>"
training:
  problem_type: Classification
  target_column: overall

  tokenize:
    stop_words : english

  embeddings:
    vector_size : 300
    epochs : 15
    window : 9
  
  split:
    test_size : 0.2
    random_state : 43
  
  hyperparameters:
    LogisticRegression:
      C : [0.01,0.1,1,10]
    
    DecisionTreeClassifier:
      max_depth : [5,10,15]
      min_samples_split : [2,5,10] 
      max_features: ['sqrt','log2']
      criterion: ['gini','entropy','log_loss']
      splitter: ['best','random']

    RandomForestClassifier:
       n_estimators : [25,50,75,100]
       criterion: ['gini','entropy','log_loss']
       max_depth: [5,10,15]
       min_samples_split: [2,4,6,8]
       max_features: ['sqrt','log2']
    
    GaussianNB:
      var_smoothing : [0.001,0.01,0.1,1]

    LinearSVC:
      penalty: ['l1','l2']
      loss : ['hinge','squared-hinge']
      max_iter : [25,50,75,100]
      C : [0.001,0.005,0.01,0.05,0.1,0.5]
    
    params:
      scoring : 'f1_weighted'
      cv : 3
      n_jobs: -1
      verbose: 3


  model_output:
    model_dir : "C:\\Aditya\\ML_Practice\\ML_Projects\\Amazon_Reviews_Sentimment_Analysis\\models"
    embed_extension: model
    model_extension: pkl

prediction:
  predict_model_dir : "C:\\Aditya\\ML_Practice\\ML_Projects\\Amazon_Reviews_Sentimment_Analysis\\models"
  embed_model :  'w2vmodel.model'
  predict_model : 'DecisionTreeClassifier.pkl' 